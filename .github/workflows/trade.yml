name: Daily Auto Trading

on:
  schedule:
    - cron: "55 23 * * 0-4"  # UTC 기준
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas google-genai pykrx python-dotenv # 필요한 라이브러리 추가

    - name: Run Trading Bot
      env:
        # GitHub Secrets에 등록한 변수들을 불러옵니다
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # 한국투자증권 API 키 등 필요한 환경변수 추가
        KIS_APPKEY: ${{ secrets.KIS_APPKEY }}
        KIS_APPSECRET: ${{ secrets.KIS_APPSECRET }}
      run: python main.py